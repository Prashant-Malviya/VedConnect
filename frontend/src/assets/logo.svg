<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VedConnect logo">
  <defs>
    <linearGradient id="vc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7E22CE" />
      <stop offset="100%" stop-color="#3B0764" />
    </linearGradient>
    <linearGradient id="vc-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF4E" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <circle cx="32" cy="32" r="31" fill="url(#vc-bg)" />
  <circle cx="32" cy="32" r="31" fill="none" stroke="#FBBF4E" stroke-opacity="0.25" stroke-width="1" />

  <!-- minimal lotus formed from petals -->
  <g transform="translate(32,36)">
    <path d="M0,0 C-10,-4 -14,-14 -8,-22 C-4,-14 -2,-6 0,0 Z" fill="url(#vc-gold)" opacity="0.95" />
    <path d="M0,0 C10,-4 14,-14 8,-22 C4,-14 2,-6 0,0 Z" fill="#F3EEFC" opacity="0.9" />
    <path d="M0,0 C-6,-2 -9,-10 -4,-16 C-2,-10 -1,-4 0,0 Z" fill="#FBBF4E" opacity="0.85" />
    <path d="M0,0 C6,-2 9,-10 4,-16 C2,-10 1,-4 0,0 Z" fill="#EADCF6" opacity="0.85" />
    <path d="M0,0 C-16,2 -22,-2 -20,-8 C-14,-8 -6,-4 0,0 Z" fill="#F3EEFC" opacity="0.8" />
    <path d="M0,0 C16,2 22,-2 20,-8 C14,-8 6,-4 0,0 Z" fill="#FBBF4E" opacity="0.8" />
  </g>

  <!-- connected dots / constellation arc beneath the lotus -->
  <g stroke="#FBBF4E" stroke-width="1.4" opacity="0.9">
    <line x1="14" y1="44" x2="24" y2="48" />
    <line x1="24" y1="48" x2="40" y2="48" />
    <line x1="40" y1="48" x2="50" y2="44" />
  </g>
  <circle cx="14" cy="44" r="2" fill="#FBBF4E" />
  <circle cx="24" cy="48" r="2.2" fill="#F3EEFC" />
  <circle cx="40" cy="48" r="2.2" fill="#F3EEFC" />
  <circle cx="50" cy="44" r="2" fill="#FBBF4E" />
</svg>
